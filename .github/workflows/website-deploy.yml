name: Website Deploy

on:
  push:
    branches:
      - master
    paths:
      - 'services/website/**'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'services/website/package-lock.json'
          
      - name: Install dependencies
        working-directory: services/website
        run: npm ci
        
      - name: Build website
        working-directory: services/website
        run: npm run build
        
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy services/website/dist --project-name=infralayer-website